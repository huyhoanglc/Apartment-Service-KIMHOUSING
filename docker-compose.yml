services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-apartments}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-apartments}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_APP_PASSWORD: ${EMAIL_APP_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID}
      GOOGLE_CLIENT_EMAIL: ${GOOGLE_CLIENT_EMAIL}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY}
      EMPLOYEE_SYNC_CRON: ${EMPLOYEE_SYNC_CRON:-}
      EMPLOYEE_SYNC_TIMEZONE: ${EMPLOYEE_SYNC_TIMEZONE:-Asia/Ho_Chi_Minh}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  customer-web:
    build:
      context: ./apps/customer-web
    restart: unless-stopped
    environment:
      # Server Component gọi trực tiếp container backend qua mạng nội bộ docker-compose,
      # KHÔNG phải localhost (chỉ trình duyệt trên máy host mới thấy localhost)
      API_URL: http://backend:5000
    ports:
      - "3001:3000"
    depends_on:
      - backend

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      args:
        # Chạy trong trình duyệt của máy host nên phải trỏ ra cổng đã publish (localhost),
        # không dùng được tên service nội bộ docker-compose như customer-web ở trên
        NEXT_PUBLIC_API_URL: http://localhost:5000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
